<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0a1a">
<title>支出记账</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif;background:#0f0a1a;color:#e2e0ea;min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
input:focus{outline:none;border-color:#7c3aed !important}
button{cursor:pointer;border:none;background:none;font-family:inherit}
::-webkit-scrollbar{display:none}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#2d1a4e;color:#d8b4fe;padding:7px 18px;border-radius:18px;font-size:13px;font-weight:600;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.home-header{display:flex;justify-content:space-between;align-items:center;padding:24px 20px 14px;background:linear-gradient(135deg,#1e1333,#2d1a4e);border-radius:0 0 18px 18px}
.greeting{font-size:11px;color:#8b7fa8;margin-bottom:2px}
.today-amt{font-size:26px;font-weight:800;color:#e8e0f8}
.month-badge{background:rgba(168,85,247,.12);border-radius:10px;padding:6px 12px;text-align:center;cursor:pointer}
.month-badge-label{font-size:10px;color:#8b7fa8}
.month-badge-val{font-size:16px;font-weight:700;color:#c084fc}

.recent-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 6px}
.recent-title{font-size:13px;font-weight:600;color:#b8aed0}
.link-btn{color:#a855f7;font-size:11px;font-weight:600}

.recent-list{padding:0 16px}
.rec-item{display:flex;align-items:center;gap:7px;padding:9px 2px;border-bottom:1px solid #1a1430}
.rec-dot{width:5px;height:5px;border-radius:3px;flex-shrink:0}
.rec-cat{font-size:12px;font-weight:500;color:#d8d0ea}
.rec-note{font-size:10px;color:#6b5f86;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-amt{font-size:13px;font-weight:700;color:#f87171;margin-left:auto}

.empty{text-align:center;color:#6b5f86;padding:24px 0;font-size:12px;line-height:1.6}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 6px}
.back-btn{color:#a855f7;font-size:16px;font-weight:600}
.top-title{font-size:15px;font-weight:700;color:#e8e0f8}

.month-nav{display:flex;align-items:center;justify-content:center;gap:14px;padding:2px 0 6px}
.nav-btn{background:rgba(168,85,247,.12);color:#c084fc;font-size:11px;padding:4px 10px;border-radius:7px}
.month-label{font-size:14px;font-weight:600;color:#d8b4fe}

.list-wrap{padding:0 16px}
.list-item{padding:9px 0;border-bottom:1px solid #1a1430;display:flex;align-items:center;gap:7px}
.list-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.list-info{flex:1;display:flex;flex-direction:column;gap:1px}
.list-cat{font-size:12px;font-weight:500;color:#d8d0ea}
.list-date{font-size:9px;color:#6b5f86}
.list-amt{font-weight:700;font-size:13px;color:#f87171;flex-shrink:0}
.tiny-btn{font-size:11px;padding:2px 3px;opacity:.5;color:#e2e0ea}

.edit-box{width:100%;padding:6px 0}
.edit-row{display:flex;gap:6px;margin-bottom:6px}
.edit-input{padding:6px 8px;border-radius:7px;border:1px solid #2d1a4e;background:#0f0a1a;color:#e2e0ea;font-size:12px;font-family:inherit}
.edit-cat-row{display:flex;gap:3px;flex-wrap:wrap}
.edit-cat-btn{width:28px;height:28px;border-radius:6px;border:1px solid #2d1a4e;background:#0f0a1a;font-size:13px;display:flex;align-items:center;justify-content:center}
.edit-cat-btn.active{border-color:var(--c)}
.edit-actions{display:flex;gap:8px;margin-top:8px}
.edit-cancel{flex:1;padding:6px;border-radius:7px;border:1px solid #2d1a4e;color:#8b7fa8;font-size:11px}
.edit-save{flex:1;padding:6px;border-radius:7px;background:#7c3aed;color:#fff;font-size:11px;font-weight:600}

.clear-btn{display:block;margin:16px auto;border:1px solid #2d1a4e;color:#6b5f86;padding:6px 16px;border-radius:7px;font-size:10px}

.stats-total{text-align:center;padding:8px 0}
.stats-total-label{font-size:11px;color:#8b7fa8}
.stats-total-val{font-size:26px;font-weight:800;color:#c084fc}
.stats-wrap{padding:0 16px}

.chart-box{background:#1a1228;border-radius:12px;padding:10px 8px 8px;margin-bottom:8px}
.chart-title{margin:0 0 4px 8px;font-size:11px;color:#8b7fa8;font-weight:600}

.cat-list{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.cat-row{display:flex;align-items:center;gap:5px;font-size:12px}
.cat-icon{font-size:14px;width:20px;text-align:center}
.cat-name{width:34px;font-size:11px;color:#b8aed0}
.cat-bar-wrap{flex:1;height:6px;background:#1a1228;border-radius:3px;overflow:hidden}
.cat-bar{height:100%;border-radius:3px;transition:width .3s}
.cat-amt{width:50px;text-align:right;font-weight:600;color:#d8b4fe;font-size:12px}
.cat-pct{width:28px;text-align:right;color:#8b7fa8;font-size:10px}

.pie-svg{display:block;margin:0 auto}

.daily-bars{display:flex;align-items:flex-end;gap:2px;height:80px;padding:0 4px}
.daily-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.daily-bar{width:100%;border-radius:2px 2px 0 0;background:#a855f7;min-height:2px;transition:height .3s}
.daily-label{font-size:7px;color:#6b5f86}

/* Bottom input bar */
.input-bar{position:fixed;bottom:46px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#130e22;border-top:1px solid #1f1835;padding:6px 10px 4px;z-index:100}
.quick-row{display:flex;gap:4px;margin-bottom:5px}
.quick-btn{padding:4px 0;min-width:34px;border-radius:6px;border:1px solid #2d1a4e;background:#1a1228;color:#b8aed0;font-size:11px;font-weight:600;flex-shrink:0;transition:all .12s}
.quick-btn.active{background:#7c3aed;color:#fff;border-color:#7c3aed}
.amt-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.yen{font-size:16px;font-weight:700;color:#7c3aed}
.amt-input{flex:1;padding:7px 8px;border-radius:8px;border:1px solid #2d1a4e;background:#0f0a1a;color:#e2e0ea;font-size:17px;font-weight:700;font-family:inherit}
.note-toggle{background:rgba(168,85,247,.12);color:#a855f7;padding:7px 9px;border-radius:7px;font-size:12px}
.note-toggle.active{background:rgba(124,58,237,.2)}
.note-input{width:100%;padding:5px 8px;border-radius:7px;border:1px solid #2d1a4e;background:#0f0a1a;color:#e2e0ea;font-size:11px;margin-bottom:4px;font-family:inherit}
.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
.cat-btn{display:flex;flex-direction:column;align-items:center;padding:6px 2px;border-radius:7px;border:1px solid #1f1835;background:#1a1228;transition:all .1s}
.cat-btn:active{background:#2d1a4e;transform:scale(.95)}
.cat-btn-icon{font-size:17px}
.cat-btn-label{font-size:9px;color:#a89cc0;margin-top:1px}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0c0816;border-top:1px solid #1a1430;display:flex;justify-content:space-around;padding:5px 0 max(8px,env(safe-area-inset-bottom));z-index:101}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:1px;color:#6b5f86;padding:2px 14px}
.nav-item.active{color:#c084fc}
.nav-item-icon{font-size:17px}
.nav-item-label{font-size:9px}

.page{padding-bottom:4px}
.content-pad{padding-bottom:250px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CATEGORIES=[
{key:"food",label:"餐饮",icon:"🍜",color:"#a855f7"},
{key:"transport",label:"交通",icon:"🚌",color:"#6366f1"},
{key:"shopping",label:"购物",icon:"🛒",color:"#ec4899"},
{key:"entertainment",label:"娱乐",icon:"🎮",color:"#f97316"},
{key:"daily",label:"日用",icon:"🧴",color:"#14b8a6"},
{key:"study",label:"学习",icon:"📚",color:"#3b82f6"},
{key:"social",label:"社交",icon:"🍻",color:"#eab308"},
{key:"health",label:"医疗",icon:"💊",color:"#ef4444"},
{key:"other",label:"其他",icon:"📦",color:"#78716c"}
];
const CAT_MAP=Object.fromEntries(CATEGORIES.map(c=>[c.key,c]));
const QUICK_AMTS=[3,5,8,10,15,20,30,50];
const STORAGE_KEY="expense-tracker-v1";
const pad=n=>String(n).padStart(2,"0");
const todayStr=()=>{const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`};
const fmtMonth=s=>s.replace("-","年")+"月";
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);

// State
let state={
  expenses:JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"),
  page:"home",
  viewMonth:(()=>{const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}`})(),
  amt:"",
  note:"",
  showNote:false,
  editId:null,
  editForm:null,
  toast:null
};
let toastTimer=null;

function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.expenses))}
function setState(patch){Object.assign(state,patch);render()}
function flash(msg){
  state.toast=msg;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{state.toast=null;render()},1200);
  render();
}

function quickAdd(catKey){
  const a=parseFloat(state.amt);
  if(!a||a<=0){flash("⚠ 先输入金额");return}
  const cat=CAT_MAP[catKey];
  state.expenses.push({id:uid(),amount:a,category:catKey,date:todayStr(),note:state.note.trim()});
  saveData();
  flash(`✓ ${cat.icon} ${cat.label} ¥${a}`);
  state.amt="";state.note="";state.showNote=false;
  render();
}

function deleteExp(id){
  state.expenses=state.expenses.filter(e=>e.id!==id);
  if(state.editId===id){state.editId=null;state.editForm=null}
  saveData();render();
}

function startEdit(e){
  state.editId=e.id;
  state.editForm={amount:String(e.amount),category:e.category,date:e.date,note:e.note};
  render();
}

function saveEdit(){
  if(!state.editForm)return;
  const a=parseFloat(state.editForm.amount);
  if(!a||a<=0)return;
  state.expenses=state.expenses.map(e=>e.id===state.editId?{...e,amount:a,category:state.editForm.category,date:state.editForm.date,note:state.editForm.note}:e);
  saveData();
  state.editId=null;state.editForm=null;
  flash("✓ 已更新");
}

function shiftMonth(dir){
  const[y,m]=state.viewMonth.split("-").map(Number);
  const d=new Date(y,m-1+dir,1);
  state.viewMonth=`${d.getFullYear()}-${pad(d.getMonth()+1)}`;
  render();
}

function clearAll(){
  if(!confirm("确定清空所有数据？"))return;
  state.expenses=[];saveData();render();
}

// Pie chart SVG
function pieChart(data,total){
  if(!data.length)return"";
  const cx=90,cy=90,R=70,r=40;
  let angle=-Math.PI/2;
  let paths=data.map(d=>{
    const pct=d.value/total;
    const a1=angle;
    const a2=angle+pct*2*Math.PI;
    angle=a2;
    const gap=0.03;
    const sa=a1+gap,ea=a2-gap;
    if(ea<=sa)return"";
    const large=ea-sa>Math.PI?1:0;
    const x1=cx+R*Math.cos(sa),y1=cy+R*Math.sin(sa);
    const x2=cx+R*Math.cos(ea),y2=cy+R*Math.sin(ea);
    const x3=cx+r*Math.cos(ea),y3=cy+r*Math.sin(ea);
    const x4=cx+r*Math.cos(sa),y4=cy+r*Math.sin(sa);
    return`<path d="M${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} L${x3},${y3} A${r},${r} 0 ${large} 0 ${x4},${y4} Z" fill="${d.color}"/>`;
  }).join("");
  return`<svg class="pie-svg" viewBox="0 0 180 180" width="180" height="180">${paths}</svg>`;
}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="className")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false)return;
    if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(c));
    else if(c instanceof Node)el.appendChild(c);
  });
  return el;
}

function render(){
  const app=document.getElementById("app");
  const me=state.expenses.filter(e=>e.date.startsWith(state.viewMonth));
  const total=me.reduce((s,e)=>s+e.amount,0);
  const todayTotal=state.expenses.filter(e=>e.date===todayStr()).reduce((s,e)=>s+e.amount,0);
  const catTotals=CATEGORIES.map(c=>({...c,value:me.filter(e=>e.category===c.key).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.value>0).sort((a,b)=>b.value-a.value);

  let html="";

  // Toast
  if(state.toast)html+=`<div class="toast">${state.toast}</div>`;

  html+=`<div class="content-pad">`;

  // Pages
  if(state.page==="home"){
    html+=`<div class="page">
      <div class="home-header">
        <div><div class="greeting">今日支出</div><div class="today-amt">¥${todayTotal.toFixed(2)}</div></div>
        <div class="month-badge" onclick="setState({page:'stats'})"><div class="month-badge-label">本月</div><div class="month-badge-val">¥${total.toFixed(0)}</div></div>
      </div>
      <div class="recent-header"><span class="recent-title">最近记录</span><button class="link-btn" onclick="setState({page:'list'})">全部 →</button></div>
      <div class="recent-list">`;
    const sorted=[...state.expenses].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
    if(!sorted.length){
      html+=`<p class="empty">还没有记录<br>输入金额 → 点分类 → 自动保存</p>`;
    }else{
      sorted.slice(0,10).forEach(e=>{
        const c=CAT_MAP[e.category]||CAT_MAP.other;
        html+=`<div class="rec-item"><span class="rec-dot" style="background:${c.color}"></span><span class="rec-cat">${c.icon} ${c.label}</span>${e.note?`<span class="rec-note">${esc(e.note)}</span>`:""}<span class="rec-amt">-¥${e.amount.toFixed(2)}</span></div>`;
      });
    }
    html+=`</div></div>`;

  }else if(state.page==="list"){
    html+=`<div class="page">
      <div class="top-bar"><button class="back-btn" onclick="setState({page:'home'})">←</button><span class="top-title">明细</span><div style="width:32px"></div></div>
      <div class="month-nav"><button class="nav-btn" onclick="shiftMonth(-1)">◀</button><span class="month-label">${fmtMonth(state.viewMonth)}</span><button class="nav-btn" onclick="shiftMonth(1)">▶</button></div>
      <div class="list-wrap">`;
    if(!me.length){
      html+=`<p class="empty">本月无记录</p>`;
    }else{
      [...me].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).forEach(e=>{
        const c=CAT_MAP[e.category]||CAT_MAP.other;
        if(state.editId===e.id&&state.editForm){
          html+=`<div class="list-item"><div class="edit-box">
            <div class="edit-row"><input class="edit-input" style="flex:1" type="number" value="${state.editForm.amount}" oninput="state.editForm.amount=this.value"><input class="edit-input" style="flex:1.2" type="date" value="${state.editForm.date}" oninput="state.editForm.date=this.value"></div>
            <div class="edit-cat-row">${CATEGORIES.map(cc=>`<button class="edit-cat-btn" style="${state.editForm.category===cc.key?`background:${cc.color}33;border-color:${cc.color}`:""}" onclick="state.editForm.category='${cc.key}';render()">${cc.icon}</button>`).join("")}</div>
            <input class="edit-input" style="width:100%;margin-top:6px" placeholder="备注" value="${esc(state.editForm.note)}" oninput="state.editForm.note=this.value">
            <div class="edit-actions"><button class="edit-cancel" onclick="state.editId=null;state.editForm=null;render()">取消</button><button class="edit-save" onclick="saveEdit()">保存</button></div>
          </div></div>`;
        }else{
          html+=`<div class="list-item">
            <span class="list-icon" style="background:${c.color}22;color:${c.color}">${c.icon}</span>
            <div class="list-info"><span class="list-cat">${c.label}${e.note?` · ${esc(e.note)}`:""}</span><span class="list-date">${e.date}</span></div>
            <span class="list-amt">-¥${e.amount.toFixed(2)}</span>
            <button class="tiny-btn" onclick="startEdit(state.expenses.find(x=>x.id==='${e.id}'))">✏️</button>
            <button class="tiny-btn" onclick="deleteExp('${e.id}')">✕</button>
          </div>`;
        }
      });
    }
    if(state.expenses.length)html+=`<button class="clear-btn" onclick="clearAll()">清空所有数据</button>`;
    html+=`</div></div>`;

  }else if(state.page==="stats"){
    html+=`<div class="page">
      <div class="top-bar"><button class="back-btn" onclick="setState({page:'home'})">←</button><span class="top-title">统计</span><div style="width:32px"></div></div>
      <div class="month-nav"><button class="nav-btn" onclick="shiftMonth(-1)">◀</button><span class="month-label">${fmtMonth(state.viewMonth)}</span><button class="nav-btn" onclick="shiftMonth(1)">▶</button></div>
      <div class="stats-total"><div class="stats-total-label">本月总计</div><div class="stats-total-val">¥${total.toFixed(2)}</div></div>`;
    if(!catTotals.length){
      html+=`<p class="empty">本月无数据</p>`;
    }else{
      html+=`<div class="stats-wrap"><div class="chart-box">${pieChart(catTotals,total)}</div>`;
      html+=`<div class="cat-list">${catTotals.map(c=>`<div class="cat-row"><span class="cat-icon">${c.icon}</span><span class="cat-name">${c.label}</span><div class="cat-bar-wrap"><div class="cat-bar" style="width:${(c.value/total*100)}%;background:${c.color}"></div></div><span class="cat-amt">¥${c.value.toFixed(0)}</span><span class="cat-pct">${(c.value/total*100).toFixed(0)}%</span></div>`).join("")}</div>`;

      // Daily bars
      const dailyMap={};
      me.forEach(e=>{const d=e.date.slice(8);dailyMap[d]=(dailyMap[d]||0)+e.amount});
      const days=Object.entries(dailyMap).sort(([a],[b])=>a.localeCompare(b));
      if(days.length>1){
        const maxD=Math.max(...days.map(([,v])=>v));
        html+=`<div class="chart-box" style="margin-top:10px"><p class="chart-title">每日支出</p><div class="daily-bars">${days.map(([d,v])=>`<div class="daily-col"><div class="daily-bar" style="height:${Math.max(2,v/maxD*70)}px"></div><div class="daily-label">${parseInt(d)}</div></div>`).join("")}</div></div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  }

  html+=`</div>`;

  // Input bar
  html+=`<div class="input-bar">
    <div class="quick-row">${QUICK_AMTS.map(q=>`<button class="quick-btn${state.amt===String(q)?" active":""}" onclick="setState({amt:state.amt==='${q}'?'':'${q}'})">${q}</button>`).join("")}</div>
    <div class="amt-row">
      <span class="yen">¥</span>
      <input class="amt-input" type="number" inputmode="decimal" placeholder="金额" value="${state.amt}" oninput="state.amt=this.value" id="amt-field">
      <button class="note-toggle${state.showNote?" active":""}" onclick="setState({showNote:!state.showNote})">📝</button>
    </div>
    ${state.showNote?`<input class="note-input" placeholder="备注（可选）如：食堂午饭" value="${esc(state.note)}" oninput="state.note=this.value">`:""}
    <div class="cat-grid">${CATEGORIES.map(c=>`<button class="cat-btn" onclick="quickAdd('${c.key}')"><span class="cat-btn-icon">${c.icon}</span><span class="cat-btn-label">${c.label}</span></button>`).join("")}</div>
  </div>`;

  // Bottom nav
  html+=`<div class="bottom-nav">${[{k:"home",icon:"🏠",l:"首页"},{k:"list",icon:"📋",l:"明细"},{k:"stats",icon:"📊",l:"统计"}].map(t=>`<button class="nav-item${state.page===t.k?" active":""}" onclick="setState({page:'${t.k}'})"><span class="nav-item-icon">${t.icon}</span><span class="nav-item-label">${t.l}</span></button>`).join("")}</div>`;

  app.innerHTML=html;

  // Restore focus on amount field after render if on home page
  const amtField=document.getElementById("amt-field");
  if(amtField&&document.activeElement?.tagName!=="INPUT"){
    // Don't auto-focus to avoid keyboard popup
  }
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

render();
</script>
