<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif;background:#0f0a1a;color:#e2e0ea;min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

textarea:focus{outline:none;border-color:#7c3aed !important}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#2d1a4e;color:#d8b4fe;padding:7px 18px;border-radius:18px;font-size:13px;font-weight:600;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;animation:toastIn .2s}

.yen{font-size:16px;font-weight:700}

.cat-btn{display:flex;flex-direction:column;align-items:center;padding:6px 2px;border-radius:7px;border:1px solid #1f1835;background:#1a1228;transition:all .1s}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0c0816;border-top:1px solid #1a1430;display:flex;justify-content:space-around;padding:5px 0 max(8px,env(safe-area-inset-bottom));z-index:101}

/* Data page */
.data-section{padding:0 16px;margin-bottom:16px}
.data-card{background:#1a1228;border-radius:12px;padding:14px;margin-bottom:10px}
.data-card-title{font-size:13px;font-weight:600;color:#d8b4fe;margin-bottom:8px}
.data-card-desc{font-size:11px;color:#6b5f86;margin-bottom:10px;line-height:1.5}
.data-btn{display:block;width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;margin-bottom:6px;transition:all .15s}
.data-btn:active{transform:scale(.98)}
.data-btn-primary{background:#7c3aed;color:#fff}
.data-btn-secondary{background:rgba(168,85,247,.12);color:#c084fc}
.data-btn-danger{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.data-textarea{width:100%;height:140px;padding:10px;border-radius:8px;border:1px solid #2d1a4e;background:#0f0a1a;color:#e2e0ea;font-size:11px;font-family:'Courier New',monospace;resize:vertical;line-height:1.5}
.data-info{font-size:10px;color:#6b5f86;margin-top:6px;line-height:1.4}
.data-count{background:rgba(168,85,247,.12);color:#c084fc;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block;margin-bottom:8px}
.file-input-wrap{position:relative;overflow:hidden;display:block}
.file-input-wrap input[type=file]{position:absolute;left:0;top:0;width:100%;height:100%;opacity:0;cursor:pointer}
.preview-box{background:#0f0a1a;border-radius:8px;padding:10px;margin-top:8px;max-height:200px;overflow-y:auto;font-size:10px;color:#b8aed0;line-height:1.6}
.preview-item{padding:4px 0;border-bottom:1px solid #1a1430;display:flex;justify-content:space-between}
.preview-cat{color:#a855f7}
.preview-amt-out{color:#f87171}
.preview-amt-in{color:#34d399}

<body>
<div id="app"></div>
<script>
const EXP_CATS=[
{key:"food",label:"餐饮",icon:"🍜",color:"#a855f7"},
{key:"transport",label:"交通",icon:"🚌",color:"#6366f1"},
{key:"shopping",label:"购物",icon:"🛒",color:"#ec4899"},
{key:"entertainment",label:"娱乐",icon:"🎮",color:"#f97316"},
{key:"daily",label:"日用",icon:"🧴",color:"#14b8a6"},
{key:"study",label:"学习",icon:"📚",color:"#3b82f6"},
{key:"social",label:"社交",icon:"🍻",color:"#eab308"},
{key:"health",label:"医疗",icon:"💊",color:"#ef4444"},
{key:"other",label:"其他",icon:"📦",color:"#78716c"}
];
const INC_CATS=[
{key:"salary",label:"工资",icon:"💵",color:"#34d399"},
{key:"parttime",label:"兼职",icon:"💼",color:"#2dd4bf"},
{key:"gift",label:"红包",icon:"🧧",color:"#f472b6"},
{key:"transfer",label:"转账",icon:"💳",color:"#60a5fa"},
{key:"refund",label:"退款",icon:"↩️",color:"#a78bfa"},
{key:"scholarship",label:"奖学金",icon:"🎓",color:"#fbbf24"},
{key:"invest",label:"理财",icon:"📈",color:"#4ade80"},
{key:"other_in",label:"其他",icon:"📥",color:"#94a3b8"}
];
const ALL_CATS=[...EXP_CATS,...INC_CATS];
const CAT_MAP=Object.fromEntries(ALL_CATS.map(c=>[c.key,c]));
const EXP_QUICK=[3,5,8,10,15,20,30,50];
const INC_QUICK=[50,100,200,500,1000,2000,3000,5000];
const SK="expense-tracker-v2";
const pad=n=>String(n).padStart(2,"0");
const todayStr=()=>{const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`};
const fmtMonth=s=>s.replace("-","年")+"月";
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// Category auto-match by keywords
const CAT_KEYWORDS={
  food:["餐","饭","食","吃","外卖","美团","饿了么","奶茶","咖啡","早餐","午餐","晚餐","零食","水果","饮料","小吃","火锅","烧烤","面","粉","汤","菜","超市","便利店"],
  transport:["交通","打车","滴滴","公交","地铁","出租","高铁","火车","飞机","机票","油费","加油","停车","共享单车","骑行"],
  shopping:["购物","淘宝","京东","拼多多","天猫","买","衣服","鞋","包","数码","电子","手机","配件"],
  entertainment:["娱乐","游戏","电影","KTV","门票","旅游","景点","充值","会员","视频","音乐","Steam"],
  daily:["日用","洗","纸","卫生","牙","毛巾","清洁","护肤","化妆","理发","剪发"],
  study:["学习","书","文具","课","培训","考试","打印","复印","教材","笔"],
  social:["社交","聚餐","送礼","随礼","红包","请客","AA"],
  health:["医","药","医院","诊所","体检","看病","挂号"],
  salary:["工资","薪","月薪","底薪"],
  parttime:["兼职","外快","零工","稿费","劳务"],
  gift:["红包","压岁钱","礼金"],
  transfer:["转账","转入","汇款"],
  refund:["退款","退货","返现","返利"],
  scholarship:["奖学金","助学金","补贴","津贴"],
  invest:["理财","利息","股票","基金","收益","分红"],
};

function matchCategory(text,type){
  text=(text||"").toLowerCase();
  const pool=type==="income"?INC_CATS:EXP_CATS;
  for(const cat of pool){
    const kws=CAT_KEYWORDS[cat.key]||[];
    if(kws.some(k=>text.includes(k)))return cat.key;
  }
  return type==="income"?"other_in":"other";
}

// Migrate v1
(function(){
  const v1=localStorage.getItem("expense-tracker-v1");
  if(v1&&!localStorage.getItem(SK)){
    try{localStorage.setItem(SK,JSON.stringify(JSON.parse(v1).map(e=>({...e,type:"expense"}))))}catch{}
  }
})();

let S={
  entries:JSON.parse(localStorage.getItem(SK)||"[]"),
  page:"home",viewMonth:(()=>{const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}`})(),
  inputType:"expense",amt:"",note:"",showNote:false,
  editId:null,editForm:null,toast:null,listFilter:"all",
  importText:"",importPreview:null
};
let toastTimer=null;

function saveData(){localStorage.setItem(SK,JSON.stringify(S.entries))}
function ss(p){Object.assign(S,p);render()}
function flash(m){S.toast=m;clearTimeout(toastTimer);toastTimer=setTimeout(()=>{S.toast=null;render()},1200);render()}

function quickAdd(ck){
  const a=parseFloat(S.amt);if(!a||a<=0){flash("⚠ 先输入金额");return}
  S.entries.push({id:uid(),amount:a,category:ck,date:todayStr(),note:S.note.trim(),type:S.inputType});
  saveData();flash(`✓ ${CAT_MAP[ck].icon} ${S.inputType==="income"?"+":"-"}¥${a}`);
  S.amt="";S.note="";S.showNote=false;render();
}
function deleteEntry(id){S.entries=S.entries.filter(e=>e.id!==id);if(S.editId===id){S.editId=null;S.editForm=null}saveData();render()}
function startEdit(e){S.editId=e.id;S.editForm={amount:String(e.amount),category:e.category,date:e.date,note:e.note,type:e.type||"expense"};render()}
function saveEdit(){if(!S.editForm)return;const a=parseFloat(S.editForm.amount);if(!a||a<=0)return;S.entries=S.entries.map(e=>e.id===S.editId?{...e,amount:a,category:S.editForm.category,date:S.editForm.date,note:S.editForm.note,type:S.editForm.type}:e);saveData();S.editId=null;S.editForm=null;flash("✓ 已更新")}
function shiftMonth(d){const[y,m]=S.viewMonth.split("-").map(Number);const dt=new Date(y,m-1+d,1);S.viewMonth=`${dt.getFullYear()}-${pad(dt.getMonth()+1)}`;render()}
function clearAll(){if(!confirm("确定清空所有数据？"))return;S.entries=[];saveData();render()}

// === IMPORT / EXPORT ===

// Parse text: each line = "日期 金额 [分类] [备注]" or "金额 [分类] [备注]"
function parseTextImport(text){
  const lines=text.trim().split("\n").filter(l=>l.trim());
  const results=[];
  for(const line of lines){
    const parts=line.trim().split(/[\t,，\s]+/);
    let date=todayStr(),amount=0,note="",type="expense";
    // Find date-like token
    let rest=[];
    for(const p of parts){
      if(/^\d{4}[-/.]\d{1,2}[-/.]\d{1,2}$/.test(p)){
        const dp=p.replace(/[/.]/g,"-").split("-");
        date=`${dp[0]}-${pad(parseInt(dp[1]))}-${pad(parseInt(dp[2]))}`;
      }else{rest.push(p)}
    }
    // Find amount
    let amtIdx=-1;
    for(let i=0;i<rest.length;i++){
      const n=parseFloat(rest[i].replace(/[¥￥+\-]/g,""));
      if(!isNaN(n)&&n>0){amount=n;amtIdx=i;if(rest[i].startsWith("+")||rest[i].startsWith("＋"))type="income";break}
    }
    if(amtIdx===-1)continue;
    const textParts=rest.filter((_,i)=>i!==amtIdx);
    note=textParts.join(" ");
    const cat=matchCategory(note,type);
    results.push({id:uid(),date,amount,category:cat,note,type});
  }
  return results;
}

// Parse CSV (Alipay / WeChat / generic)
function parseCSV(text){
  // Strip BOM and header lines that start with non-data chars
  text=text.replace(/^\uFEFF/,"");
  const lines=text.split("\n").map(l=>l.trim()).filter(l=>l);
  if(lines.length<2)return[];
  
  // Find header row (contains 金额 or amount)
  let headerIdx=0;
  for(let i=0;i<Math.min(lines.length,20);i++){
    if(/金额|amount|交易时间|收支|类型/i.test(lines[i])){headerIdx=i;break}
  }
  const headers=parseCSVLine(lines[headerIdx]).map(h=>h.trim().replace(/"/g,""));
  
  // Find relevant column indices
  const find=(keywords)=>headers.findIndex(h=>keywords.some(k=>h.includes(k)));
  const amtCol=find(["金额","amount","Amount","交易金额"]);
  const dateCol=find(["时间","日期","date","Date","交易时间","创建时间"]);
  const typeCol=find(["收支","类型","收/支","type","交易类型","资金流向"]);
  const noteCol=find(["商品","备注","说明","描述","商品说明","交易对方","description","商户","对方"]);
  const catCol=find(["分类","类别","category","交易分类"]);
  
  if(amtCol===-1)return[];
  
  const results=[];
  for(let i=headerIdx+1;i<lines.length;i++){
    const cols=parseCSVLine(lines[i]).map(c=>c.trim().replace(/^"|"$/g,""));
    if(cols.length<=amtCol)continue;
    
    let amount=parseFloat(cols[amtCol].replace(/[¥￥,，\s]/g,""));
    if(!amount||amount<=0)continue;
    
    let date=todayStr();
    if(dateCol>=0&&cols[dateCol]){
      const dm=cols[dateCol].match(/(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
      if(dm)date=`${dm[1]}-${pad(parseInt(dm[2]))}-${pad(parseInt(dm[3]))}`;
    }
    
    let type="expense";
    if(typeCol>=0){
      const tv=cols[typeCol];
      if(/收入|入账|转入|退款/.test(tv))type="income";
    }
    
    let note="";
    if(noteCol>=0)note=cols[noteCol]||"";
    if(catCol>=0&&cols[catCol])note=(note?note+" ":"")+cols[catCol];
    
    const cat=matchCategory(note+(catCol>=0?cols[catCol]:""),type);
    results.push({id:uid(),date,amount,category:cat,note:note.slice(0,50),type});
  }
  return results;
}

function parseCSVLine(line){
  const result=[];let current="";let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQuotes=!inQuotes}
    else if(ch===","&&!inQuotes){result.push(current);current=""}
    else{current+=ch}
  }
  result.push(current);return result;
}

function handleFileImport(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    let parsed;
    if(file.name.endsWith(".json")){
      try{
        const data=JSON.parse(text);
        parsed=Array.isArray(data)?data:[];
        parsed=parsed.filter(e=>e.amount&&e.date).map(e=>({...e,id:e.id||uid(),type:e.type||"expense",category:e.category||"other"}));
      }catch{flash("⚠ JSON格式错误");return}
    }else{
      parsed=parseCSV(text);
    }
    if(!parsed.length){flash("⚠ 未识别到数据");return}
    S.importPreview=parsed;render();
  };
  reader.readAsText(file,"utf-8");
}

function confirmImport(){
  if(!S.importPreview||!S.importPreview.length)return;
  S.entries=[...S.entries,...S.importPreview];
  saveData();
  flash(`✓ 导入 ${S.importPreview.length} 条`);
  S.importPreview=null;S.importText="";render();
}

function previewTextImport(){
  const parsed=parseTextImport(S.importText);
  if(!parsed.length){flash("⚠ 未识别到数据");return}
  S.importPreview=parsed;render();
}

function exportCSV(){
  const header="日期,类型,分类,金额,备注\n";
  const rows=S.entries.map(e=>{
    const c=CAT_MAP[e.category]||{label:"其他"};
    return`${e.date},${e.type==="income"?"收入":"支出"},${c.label},${e.amount},"${(e.note||"").replace(/"/g,'""')}"`;
  }).join("\n");
  download(header+rows,"记账数据.csv","text/csv;charset=utf-8");
}

function exportJSON(){
  download(JSON.stringify(S.entries,null,2),"记账数据.json","application/json");
}

function download(content,filename,type){
  const blob=new Blob(["\uFEFF"+content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// === PIE CHART ===
function pieChart(data,total){
  if(!data.length)return"";
  const cx=90,cy=90,R=70,r=40;let angle=-Math.PI/2;
  let paths=data.map(d=>{
    const pct=d.value/total;const a1=angle;const a2=angle+pct*2*Math.PI;angle=a2;
    const gap=0.03;const sa=a1+gap,ea=a2-gap;if(ea<=sa)return"";
    const large=ea-sa>Math.PI?1:0;
    return`<path d="M${cx+R*Math.cos(sa)},${cy+R*Math.sin(sa)} A${R},${R} 0 ${large} 1 ${cx+R*Math.cos(ea)},${cy+R*Math.sin(ea)} L${cx+r*Math.cos(ea)},${cy+r*Math.sin(ea)} A${r},${r} 0 ${large} 0 ${cx+r*Math.cos(sa)},${cy+r*Math.sin(sa)} Z" fill="${d.color}"/>`;
  }).join("");
  return`<svg class="pie-svg" viewBox="0 0 180 180" width="170" height="170">${paths}</svg>`;
}
